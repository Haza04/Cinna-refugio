<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinna-Refugio</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --azul-cinna: #b3e5fc; --azul-texto: #5da9e9; --blanco: #ffffff; }
        body { 
            background-color: #f0f8ff; font-family: 'Quicksand', sans-serif; 
            color: var(--azul-texto); margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 450px; }
        .cinna-box { height: 150px; display: flex; align-items: center; justify-content: center; }
        
        /* Imagen de respaldo estable */
        .header-img { 
            width: 130px; 
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        .card {
            background: var(--blanco); border-radius: 25px; padding: 20px;
            margin-bottom: 15px; box-shadow: 0 8px 20px rgba(179,229,252,0.2);
            border: 2px solid var(--azul-cinna);
        }
        textarea {
            width: 100%; border: 1px solid #eef2f5; border-radius: 15px;
            padding: 12px; font-family: 'Quicksand'; font-size: 16px;
            resize: none; outline: none; background: #fafcfe;
        }
        button {
            background-color: var(--azul-cinna); color: #4a90e2; border: none;
            padding: 14px; border-radius: 50px; font-weight: 600; width: 100%; 
            cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="cinna-box">
            <img src="https://i.imgur.com/W9vU7vG.png" id="cinnaImg" class="header-img" alt="Cinnamoroll">
        </div>

        <div class="card">
            <h2>☁️ Desahogo con Cinnamoroll</h2>
            <textarea id="moodInput" rows="3" placeholder="Escribe aquí..."></textarea>
            <button onclick="analizarSentimiento()">✨ Recibir Apoyo</button>
        </div>

        <div id="habitCard" class="card" style="display:none;">
            <div id="dynamicHabits"></div>
        </div>
    </div>

    <audio id="magicSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        function analizarSentimiento() {
            const texto = document.getElementById('moodInput').value.toLowerCase();
            const habitContainer = document.getElementById('dynamicHabits');
            const habitCard = document.getElementById('habitCard');
            const audio = document.getElementById('magicSound');
            
            if(!texto.trim()) return;

            // ACTIVAR SONIDO
            audio.currentTime = 0;
            audio.play().catch(e => console.log("El navegador bloqueó el sonido inicial"));

            habitContainer.innerHTML = '<h2>☁️ Pasitos para ti</h2>';
            habitCard.style.display = 'block';
            
            let sugerencias = ['Habla con Dios un momento', 'Bebe un poco de agua', 'Respira profundo'];

            if (texto.includes('ansios') || texto.includes('estres')) {
                sugerencias = ['Haz el ejercicio de respiración 4-4-4', 'Repite: Dios tiene el control', 'Escucha ruido blanco 5 min'];
            }

            sugerencias.forEach(s => {
                habitContainer.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee">🌸 ${s}</div>`;
            });
        }
    </script>
</body>
</html>
