<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinna-Paz</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CinnaPaz">
    <link rel="apple-touch-icon" href="https://i.pinimg.com/originals/8a/9b/6e/8a9b6e5e8e8e8e8e8e8e8e8e8e8e8e8e.png">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --azul-cinna: #b3e5fc; --azul-texto: #5da9e9; --blanco: #ffffff; }
        body { 
            background-color: #f0f8ff; font-family: 'Quicksand', sans-serif; 
            color: var(--azul-texto); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { max-width: 400px; width: 100%; }
        .header-img { width: 130px; margin-top: 10px; }
        .card {
            background: var(--blanco); border-radius: 25px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 8px 15px rgba(179, 229, 252, 0.3);
            border: 2px solid var(--azul-cinna);
        }
        .habit-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; gap: 12px; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--azul-cinna); }
        button {
            background-color: var(--azul-cinna); color: #4a90e2; border: none;
            padding: 15px; border-radius: 50px; font-weight: 600; width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <center><img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/0d/Cinnamoroll_character.png/220px-Cinnamoroll_character.png" class="header-img"></center>
        
        <div class="card">
            <h2>☁️ Mis Pasitos Hoy</h2>
            <div id="habit-list">
                <div class="habit-item"><input type="checkbox" id="h1"> <span>Hablar con Dios</span></div>
                <div class="habit-item"><input type="checkbox" id="h2"> <span>Nota para terapia</span></div>
                <div class="habit-item"><input type="checkbox" id="h3"> <span>Identificar una emoción</span></div>
            </div>
        </div>

        <div class="card">
            <h2>📖 Versículo</h2>
            <p id="versiculo">"El Señor es tu guardador..."</p>
            <button onclick="nuevoVersiculo()">✨ Nueva Promesa</button>
        </div>
    </div>

    <script>
        const versiculos = [
            '"No temas, porque yo estoy contigo." - Isaías 41:10',
            '"Su amor nunca falla." - Salmo 136',
            '"Echa tu ansiedad sobre Él." - 1 Pedro 5:7',
            '"Mi paz os doy." - Juan 14:27'
        ];
        function nuevoVersiculo() {
            const index = Math.floor(Math.random() * versiculos.length);
            document.getElementById('versiculo').innerText = versiculos[index];
        }
        // Guardar progreso
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', () => localStorage.setItem(cb.id, cb.checked));
            if (localStorage.getItem(cb.id) === "true") cb.checked = true;
        });
    </script>
</body>
</html>
